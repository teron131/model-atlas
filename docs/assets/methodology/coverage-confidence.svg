<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Evidence coverage confidence</title>
  <desc id="desc">Confidence remains zero through ten percent evidence coverage, rises smoothly, and reaches one at sixty percent coverage.</desc>
  <style>
    :root { --bg: #000000; --fg: #f5f5f5; --muted: #d4d4d4; --grid: #3f3f46; --primary: #60a5fa; }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: var(--fg); }
    .muted { fill: var(--muted); font-size: 15px; }
    .label { font-size: 17px; }
    .annotation { font-size: 16px; font-weight: 600; }
    .grid { stroke: var(--grid); stroke-width: 1; }
    .axis { stroke: var(--fg); stroke-width: 1.5; }
    .series { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linejoin: round; }
    .point { fill: var(--primary); }
  </style>
  <rect width="720" height="420" fill="var(--bg)" />
  <text x="360" y="31" text-anchor="middle" class="label">Evidence coverage confidence</text>
  <line x1="90" y1="194" x2="670" y2="194" class="grid" />
  <line x1="148" y1="48" x2="148" y2="340" class="grid" />
  <line x1="438" y1="48" x2="438" y2="340" class="grid" />
  <line x1="90" y1="340" x2="670" y2="340" class="axis" />
  <line x1="90" y1="48" x2="90" y2="340" class="axis" />
  <path d="M90 340 L148 340 L177 331.8 L206 309.6 L235 276.9 L264 237.2 L293 194 L322 150.8 L351 111.1 L380 78.4 L409 56.2 L438 48 L670 48" class="series" />
  <circle cx="148" cy="340" r="6" class="point" />
  <circle cx="438" cy="48" r="6" class="point" />
  <text x="214" y="295" class="annotation">smoothstep</text>
  <text x="90" y="367" text-anchor="middle" class="muted">0%</text>
  <text x="148" y="367" text-anchor="middle" class="muted">10%</text>
  <text x="380" y="367" text-anchor="middle" class="muted">50%</text>
  <text x="438" y="367" text-anchor="middle" class="muted">60%</text>
  <text x="670" y="367" text-anchor="middle" class="muted">100%</text>
  <text x="74" y="345" text-anchor="end" class="muted">0</text>
  <text x="74" y="199" text-anchor="end" class="muted">0.5</text>
  <text x="74" y="53" text-anchor="end" class="muted">1</text>
  <text x="380" y="403" text-anchor="middle" class="label">Evidence coverage</text>
  <text transform="translate(25 194) rotate(-90)" text-anchor="middle" class="label">Confidence</text>
</svg>
