<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Model Atlas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0a0a'/%3E%3Cpath d='M7 8h18v4H11v3h10v4H11v5H7z' fill='%23eaeaea'/%3E%3C/svg%3E">
<style>
:root { color-scheme: dark; --paper:#0a0a0a; --ink:#eaeaea; --muted:#8f8f8f; --faint:#5f5f5f; --line:#eaeaea; --soft:#242424; --rail:#171717; --accent:#d84b4b; --mono-label:13px; --mono-chip:14px; --mono-data:16px; --sans-note:15px; --model-name:20px; --model-id:14px; }
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; overflow-x: hidden; background: var(--paper); color: var(--ink); font-family: "Helvetica Neue", Arial, sans-serif; }
::selection { background: var(--ink); color: var(--paper); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,.045); }
::-webkit-scrollbar-thumb { background: var(--faint); border: 3px solid var(--paper); }
body::before { content: ""; position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.025) 2px, rgba(255,255,255,.025) 4px); }
body::after { content: ""; position: fixed; inset: 0; pointer-events: none; opacity: .18; background-image: radial-gradient(circle at 20% 10%, rgba(255,255,255,.08) 0 1px, transparent 1px); background-size: 13px 11px; mix-blend-mode: screen; }
main { --frame-width: 970px; width: max-content; max-width: 100%; min-height: 100dvh; margin: 0 auto; padding: 24px 28px 34px; }
header { width: var(--frame-width); max-width: calc(100vw - 56px); border-bottom: 2px solid var(--line); padding-bottom: 16px; }
h1 { margin: 0; font-size: clamp(46px, 7vw, 104px); line-height: .84; letter-spacing: -.04em; text-transform: uppercase; }
.benchmarks { display: grid; gap: 8px; width: var(--frame-width); max-width: calc(100vw - 56px); padding: 10px 0 12px; border-bottom: 1px solid var(--line); font-family: "SF Mono", Menlo, Consolas, monospace; }
.benchmarks h2 { display: grid; grid-template-columns: max-content 1fr; gap: 12px; align-items: center; margin: 0; color: var(--muted); font-size: var(--mono-label); letter-spacing: .08em; line-height: 1.35; text-transform: uppercase; }
.benchmarks h2::after { content: ""; height: 1px; background: var(--soft); }
.benchmark-groups { display: flex; width: 100%; max-width: 100%; overflow-x: auto; border: 1px solid var(--soft); background: transparent; }
.benchmark-groups { scrollbar-width: none; }
.benchmark-groups::-webkit-scrollbar { display: none; }
.benchmark-group { min-width: 180px; max-width: 360px; padding: 9px 10px 10px; border-right: 1px solid var(--soft); background: linear-gradient(90deg, rgba(255,255,255,.028), transparent 26px), var(--paper); }
.benchmark-group:last-child { border-right: 0; }
.benchmark-group-label { display: flex; justify-content: space-between; gap: 14px; color: var(--muted); font-size: var(--mono-label); letter-spacing: .08em; line-height: 1.2; text-transform: uppercase; }
.benchmark-group-label::after { content: attr(data-count); color: var(--faint); }
.benchmark-list { display: flex; flex-wrap: wrap; gap: 5px 6px; margin: 9px 0 0; padding: 0; list-style: none; }
.benchmark-list samp { display: block; padding: 4px 6px; border: 1px solid var(--soft); color: var(--ink); font: inherit; font-size: var(--mono-chip); letter-spacing: .02em; white-space: nowrap; transition: border-color .18s ease, color .18s ease; }
.benchmark-list samp:hover { border-color: var(--muted); color: #fff; }
.weight-list { display: grid; grid-template-columns: 1fr; gap: 6px; }
.weight-list samp { display: grid; grid-template-columns: 1fr auto; gap: 12px; min-width: 160px; color: var(--muted); }
.weight-list b { color: var(--ink); font-weight: 700; }
.controls { display: flex; align-items: center; justify-content: space-between; gap: 16px; width: var(--frame-width); max-width: calc(100vw - 56px); padding: 12px 0; border-bottom: 1px solid var(--soft); font-family: "SF Mono", Menlo, Consolas, monospace; }
.control-meta { display: flex; align-items: center; justify-content: flex-end; gap: 12px; min-width: 0; }
.model-filter { width: min(360px, 100%); height: 38px; padding: 0 10px; border: 1px solid var(--soft); border-radius: 0; background: var(--paper); color: var(--ink); font: inherit; font-size: var(--mono-chip); outline: 0; }
.model-filter:focus { border-color: var(--ink); }
.model-filter::placeholder { color: var(--faint); opacity: 1; }
.row-count { color: var(--muted); font-size: var(--mono-label); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
.refresh-button { display: inline-grid; width: 38px; height: 38px; place-items: center; padding: 0; border: 1px solid var(--soft); border-radius: 0; background: var(--paper); color: var(--ink); cursor: pointer; }
.refresh-button:hover, .refresh-button:focus { border-color: var(--ink); outline: 0; }
.refresh-button:disabled { color: var(--faint); cursor: wait; }
.refresh-button svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.table-wrap { width: var(--frame-width); max-width: calc(100vw - 56px); overflow-x: auto; overflow-y: hidden; border-bottom: 2px solid var(--line); }
table { width: max-content; border-collapse: separate; border-spacing: 0; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: var(--mono-data); font-variant-numeric: tabular-nums; }
th, td { padding: 12px 10px; border-bottom: 1px solid var(--soft); text-align: right; vertical-align: middle; }
tbody tr { position: relative; transition: background-color .18s ease; }
tbody tr:hover { background: rgba(255,255,255,.035); }
thead { position: sticky; top: 0; z-index: 1; background: var(--paper); }
th { position: relative; background: var(--paper); border-bottom-color: transparent; box-shadow: inset 0 -1px 0 var(--line); color: var(--muted); font-size: var(--mono-label); letter-spacing: .08em; text-transform: uppercase; }
th:nth-child(2), td:nth-child(2) { text-align: left; }
th:last-child, td:last-child { min-width: 80px; }
.sort-button { display: inline-flex; align-items: center; justify-content: flex-end; gap: 6px; width: auto; margin: -7px -8px; padding: 7px 8px; border: 0; background: transparent; color: inherit; font: inherit; letter-spacing: inherit; white-space: nowrap; text-transform: inherit; cursor: pointer; }
.sort-button:hover, .sort-button.tooltip-active { background: var(--ink); color: var(--paper); }
.sort-indicator { display: inline-grid; grid-template-rows: 1fr 1fr; gap: 2px; width: 7px; height: 12px; align-items: center; justify-items: center; }
.sort-indicator::before, .sort-indicator::after { content: ""; width: 0; height: 0; border-right: 3px solid transparent; border-left: 3px solid transparent; opacity: .3; }
.sort-indicator::before { border-bottom: 4px solid currentColor; }
.sort-indicator::after { border-top: 4px solid currentColor; }
th[data-sort-state="ascending"] .sort-indicator::before, th[data-sort-state="descending"] .sort-indicator::after { opacity: 1; color: var(--ink); }
.sort-button:hover .sort-indicator::before, .sort-button:hover .sort-indicator::after, .sort-button.tooltip-active .sort-indicator::before, .sort-button.tooltip-active .sort-indicator::after { color: var(--paper); }
.metric-head { display: inline-flex; align-items: center; justify-content: flex-end; gap: 6px; white-space: nowrap; }
.metric-head svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; opacity: .9; }
.column-tooltip { position: fixed; z-index: 30; width: min(340px, calc(100vw - 36px)); padding: 11px 12px 12px; border: 1px solid var(--soft); background: #101010; color: var(--ink); text-align: left; pointer-events: none; opacity: 0; visibility: hidden; }
.column-tooltip.visible { opacity: 1; visibility: visible; }
.column-tooltip-title { margin: 0 0 7px; color: var(--ink); font-family: "SF Mono", Menlo, Consolas, monospace; font-size: var(--mono-label); font-weight: 800; letter-spacing: .08em; line-height: 1.25; text-transform: uppercase; }
.column-tooltip-body { margin: 0; color: var(--muted); font-family: "Helvetica Neue", Arial, sans-serif; font-size: var(--sans-note); font-weight: 700; letter-spacing: 0; line-height: 1.3; text-transform: none; }
.column-tooltip-rule { height: 1px; margin: 10px 0 9px; background: var(--soft); }
.column-tooltip-rule[hidden], .column-tooltip-rows[hidden], .column-tooltip-sections[hidden] { display: none; }
.column-tooltip-rows { display: grid; gap: 4px; }
.column-tooltip-row { display: grid; grid-template-columns: minmax(0, 1fr) max-content; gap: 18px; color: var(--muted); font-family: "SF Mono", Menlo, Consolas, monospace; font-size: var(--mono-label); font-weight: 800; letter-spacing: .02em; line-height: 1.2; }
.column-tooltip-row span:last-child { color: var(--ink); }
.column-tooltip-sections { display: grid; gap: 8px; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--soft); }
.column-tooltip-section { display: grid; gap: 4px; }
.column-tooltip-section-title { color: var(--faint); font-family: "SF Mono", Menlo, Consolas, monospace; font-size: var(--mono-label); font-weight: 800; letter-spacing: .08em; line-height: 1.2; text-transform: uppercase; }
.column-tooltip-section .column-tooltip-row { gap: 12px; font-size: var(--mono-label); }
.column-tooltip-section .column-tooltip-row span:first-child { white-space: nowrap; }
.column-tooltip-section .column-tooltip-row span:last-child { text-align: right; }
.rank { width: 48px; color: var(--faint); letter-spacing: .03em; }
tbody tr:nth-child(-n+3) .rank { color: var(--ink); }
.model-column { min-width: 320px; }
.model-cell { display: grid; grid-template-columns: 32px minmax(0, 1fr); gap: 12px; align-items: center; }
.model { font-family: "Helvetica Neue", Arial, sans-serif; font-size: var(--model-name); font-weight: 800; letter-spacing: -.01em; }
.id { margin-top: 4px; color: var(--muted); font-size: var(--model-id); letter-spacing: .02em; }
.provider-logo { width: 32px; height: 32px; object-fit: contain; filter: saturate(.92) contrast(1.04); }
.score-cell { min-width: 66px; }
.score-value { display: block; font-weight: 700; letter-spacing: .01em; }
.score-meter { position: relative; width: 42px; height: 2px; margin: 7px 0 0 auto; background: var(--rail); overflow: hidden; }
.score-meter::before { content: ""; position: absolute; inset: 0 auto 0 0; width: calc(var(--score, 0) * 1%); background: var(--ink); }
.score-cell.overall .score-meter::before { background: var(--accent); }
.data-cell { min-width: 70px; font-weight: 700; }
.missing { color: var(--faint); font-weight: 500; }
.missing .score-meter { visibility: hidden; }
.empty { padding: 24px 0; color: var(--muted); font-family: "SF Mono", Menlo, Consolas, monospace; font-size: var(--mono-label); letter-spacing: .06em; text-transform: uppercase; }
@media (max-width: 720px) {
  main { padding: 18px; }
  header, .benchmarks, .controls, .table-wrap { max-width: calc(100vw - 36px); }
  .benchmark-groups { grid-template-columns: 1fr; }
  .benchmark-group { max-width: none; }
  .controls { align-items: stretch; flex-direction: column; }
  .model-filter { width: 100%; }
  .control-meta { align-items: flex-end; flex-direction: column; }
  .row-count { align-self: flex-end; }
  .model-column { min-width: 260px; }
}
</style>
</head>
<body>
<main>
  <header>
    <h1>Model<br>Atlas</h1>
  </header>
  <section class="benchmarks" aria-label="Selected benchmarks">
    <h2>Selected benchmarks</h2>
    <div class="benchmark-groups" id="benchmark-groups"></div>
  </section>
  <div class="controls">
    <input class="model-filter" id="model-filter" type="search" autocomplete="off" spellcheck="false" placeholder="Filter models">
    <div class="control-meta">
      <div class="row-count" id="row-count">0 models</div>
      <button class="refresh-button" id="refresh-button" type="button" aria-label="Refresh" title="Refresh"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><button class="sort-button" type="button" data-sort="rank">#</button></th>
          <th class="model-column"><button class="sort-button" type="button" data-sort="model">Model</button></th>
          <th><button class="sort-button" type="button" data-sort="overall">Overall</button></th>
          <th><button class="sort-button" type="button" data-sort="intelligence"><span class="metric-head"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 18V5"/><path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/><path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/><path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/><path d="M18 18a4 4 0 0 0 2-7.464"/><path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/><path d="M6 18a4 4 0 0 1-2-7.464"/><path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/></svg>Intel</span></button></th>
          <th><button class="sort-button" type="button" data-sort="agentic"><span class="metric-head"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>Agent</span></button></th>
          <th><button class="sort-button" type="button" data-sort="speed"><span class="metric-head"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09"/><path d="M9 12a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.4 22.4 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 .05 5 .05"/></svg>Speed</span></button></th>
          <th><button class="sort-button" type="button" data-sort="value"><span class="metric-head"><svg aria-hidden="true" viewBox="0 0 24 24"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Value</span></button></th>
          <th><button class="sort-button" type="button" data-sort="blend">Blend</button></th>
          <th><button class="sort-button" type="button" data-sort="context">Context</button></th>
          <th><button class="sort-button" type="button" data-sort="aaCost">AA$</button></th>
          <th><button class="sort-button" type="button" data-sort="aaSeconds">AA Sec</button></th>
          <th><button class="sort-button" type="button" data-sort="aaTokens">AA Tok</button></th>
          <th><button class="sort-button" type="button" data-sort="deepSWECost">DSWE$</button></th>
          <th><button class="sort-button" type="button" data-sort="deepSWESeconds">DSWE Sec</button></th>
          <th><button class="sort-button" type="button" data-sort="deepSWETokens">DSWE Tok</button></th>
        </tr>
      </thead>
      <tbody id="model-rows"></tbody>
    </table>
  </div>
</main>
<script>
const liveStatsPath = "/api/llm-stats";
const uiPath = "/minimal_ui.html";
const labels = {
  intelligence_benchmark_keys: "Intelligence",
  agentic_benchmark_keys: "Agent",
};
const benchmarkLabels = {
	apex_agents: "APEX Agents",
	critpt: "CritPt",
	deep_swe: "DeepSWE",
	gdpval_normalized: "GDPval",
	hle: "HLE",
	ifbench: "IFBench",
	lcr: "LCR",
	omniscience_accuracy: "Omniscience",
	omniscience_nonhallucination_rate: "Omniscience NH",
	scicode: "SciCode",
	terminal_bench_2: "Terminal-Bench 2.0",
	terminalbench_hard: "TerminalBench Hard",
};

const taskMetricColumns = [
	{
		key: "aaCost",
		source: "artificial_analysis",
		metric: "cost",
		direction: "ascending",
	},
	{
		key: "aaSeconds",
		source: "artificial_analysis",
		metric: "seconds",
		direction: "ascending",
	},
	{
		key: "aaTokens",
		source: "artificial_analysis",
		metric: "output_tokens",
		direction: "descending",
	},
	{
		key: "deepSWECost",
		source: "deep_swe",
		metric: "cost",
		direction: "ascending",
	},
	{
		key: "deepSWESeconds",
		source: "deep_swe",
		metric: "seconds",
		direction: "ascending",
	},
	{
		key: "deepSWETokens",
		source: "deep_swe",
		metric: "output_tokens",
		direction: "descending",
	},
];

const taskMetricSorters = Object.fromEntries(
	taskMetricColumns.map((column) => [
		column.key,
		{
			direction: column.direction,
			type: "number",
			value: (row) => taskMetricValue(row.model, column),
		},
	]),
);

const sorters = {
	rank: { direction: "ascending", type: "number", value: (row) => row.originalIndex },
	model: { direction: "ascending", type: "text", value: (row) => row.model.name ?? row.model.id ?? "" },
	overall: { direction: "descending", type: "number", value: (row) => row.model.relative_scores?.overall_score },
	intelligence: { direction: "descending", type: "number", value: (row) => row.model.relative_scores?.intelligence_score },
	agentic: { direction: "descending", type: "number", value: (row) => row.model.relative_scores?.agentic_score },
	speed: { direction: "descending", type: "number", value: (row) => row.model.relative_scores?.speed_score },
	value: { direction: "descending", type: "number", value: (row) => row.model.relative_scores?.value_score },
	blend: { direction: "ascending", type: "number", value: (row) => row.model.cost?.blended_price },
	context: { direction: "descending", type: "number", value: (row) => row.model.context_window?.context ?? row.model.context_window?.total },
	...taskMetricSorters,
};

let tableRows = [];
let sortState = { key: "intelligence", direction: "descending" };
let filterQuery = "";
let refreshInFlight = null;
let currentUiVersion = null;
let uiVersionCheckInFlight = null;
let activeTooltipButton = null;
let columnTooltips = {};

const formatScore = (value) =>
  typeof value === "number" && Number.isFinite(value) ? value.toFixed(1) : "-";

const formatCost = (value) =>
  typeof value === "number" && Number.isFinite(value)
    ? `$${value.toFixed(value < 1 ? 3 : 2)}`
    : "-";

const formatCompactNumber = (value) => {
	if (typeof value !== "number" || !Number.isFinite(value)) {
		return "-";
	}
	if (Math.abs(value) >= 1_000_000_000) {
		return `${Number((value / 1_000_000_000).toFixed(1))}B`;
	}
	if (Math.abs(value) >= 1_000_000) {
		return `${Number((value / 1_000_000).toFixed(1))}M`;
	}
	if (Math.abs(value) >= 1_000) {
		return `${Number((value / 1_000).toFixed(1))}K`;
	}
	return value.toFixed(value < 100 ? 1 : 0);
};

const formatSeconds = (value) =>
	typeof value === "number" && Number.isFinite(value)
		? `${value.toFixed(value < 10 ? 1 : 0)}s`
		: "-";

function formatTaskMetric(value, column) {
	if (column.metric === "cost") {
		return formatCost(value);
	}
	if (column.metric === "seconds") {
		return formatSeconds(value);
	}
	return formatCompactNumber(value);
}

const formatContext = (value) => {
	if (typeof value !== "number" || !Number.isFinite(value)) {
		return "-";
	}
	if (value >= 1_000_000) {
		return `${Number((value / 1_000_000).toFixed(1))}M`;
	}
	return `${Math.round(value / 1000)}K`;
};

const formatWeight = (value) =>
	typeof value === "number" && Number.isFinite(value)
		? `${(value * 100).toFixed(0)}%`
		: "-";

const safeSlug = (value) =>
	String(value ?? "")
		.trim()
		.toLowerCase()
		.replace(/[^a-z0-9._-]+/g, "-")
		.replace(/^-+|-+$/g, "");

const createElement = (tagName, className, textContent) => {
	const element = document.createElement(tagName);
	if (className) {
		element.className = className;
	}
	if (textContent != null) {
		element.textContent = textContent;
	}
	return element;
};

function taskMetricValue(model, column) {
	return model.task_metrics?.[column.source]?.[column.metric];
}

function columnTooltipElement() {
	let tooltip = document.getElementById("column-tooltip");
	if (tooltip) {
		return tooltip;
	}
	tooltip = createElement("div", "column-tooltip");
	tooltip.id = "column-tooltip";
	tooltip.append(createElement("div", "column-tooltip-title"));
	tooltip.append(createElement("p", "column-tooltip-body"));
	tooltip.append(createElement("div", "column-tooltip-rule"));
	tooltip.append(createElement("div", "column-tooltip-rows"));
	tooltip.append(createElement("div", "column-tooltip-sections"));
	document.body.append(tooltip);
	return tooltip;
}

function appendTooltipRow(container, label, value) {
	const row = createElement("div", "column-tooltip-row");
	row.append(createElement("span", "", label));
	row.append(createElement("span", "", value));
	container.append(row);
}

function showColumnTooltip(button) {
	const key = button.dataset.sort;
	const tooltipContent = key ? columnTooltips[key] : null;
	if (!tooltipContent) {
		return;
	}
	const tooltip = columnTooltipElement();
	tooltip.querySelector(".column-tooltip-title").textContent =
		tooltipContent.title;
	tooltip.querySelector(".column-tooltip-body").textContent =
		tooltipContent.body;
	const rule = tooltip.querySelector(".column-tooltip-rule");
	const rows = tooltip.querySelector(".column-tooltip-rows");
	const sections = tooltip.querySelector(".column-tooltip-sections");
	rows.replaceChildren();
	sections.replaceChildren();
	for (const [label, value] of tooltipContent.rows ?? []) {
		appendTooltipRow(rows, label, value);
	}
	for (const sectionContent of tooltipContent.sections ?? []) {
		const section = createElement("div", "column-tooltip-section");
		section.append(
			createElement("div", "column-tooltip-section-title", sectionContent.title),
		);
		for (const [label, value] of sectionContent.rows ?? []) {
			appendTooltipRow(section, label, value);
		}
		sections.append(section);
	}
	const hasRows = rows.childElementCount > 0;
	const hasSections = sections.childElementCount > 0;
	rule.hidden = !hasRows && !hasSections;
	rows.hidden = !hasRows;
	sections.hidden = !hasSections;
	activeTooltipButton?.classList.remove("tooltip-active");
	activeTooltipButton = button;
	button.classList.add("tooltip-active");
	tooltip.classList.add("visible");
	positionColumnTooltip(button, tooltip);
}

function hideColumnTooltip(button) {
	if (activeTooltipButton && activeTooltipButton !== button) {
		return;
	}
	button.classList.remove("tooltip-active");
	activeTooltipButton = null;
	const tooltip = document.getElementById("column-tooltip");
	tooltip?.classList.remove("visible");
}

function positionColumnTooltip(button, tooltip) {
	const headerCell = button.closest("th") ?? button;
	const rect = headerCell.getBoundingClientRect();
	const tooltipWidth = tooltip.offsetWidth;
	const tooltipHeight = tooltip.offsetHeight;
	const gap = 12;
	const left = Math.max(
		18,
		Math.min(
			rect.left + rect.width / 2 - tooltipWidth / 2,
			window.innerWidth - tooltipWidth - 18,
		),
	);
	const belowTop = rect.bottom + gap;
	const top =
		belowTop + tooltipHeight > window.innerHeight - 18
			? Math.max(18, rect.top - tooltipHeight - gap)
			: belowTop;
	tooltip.style.left = `${left}px`;
	tooltip.style.top = `${top}px`;
}

const cacheBustedPath = (path) => `${path}?reload=${Date.now()}`;

function renderBenchmarkGroup(container, label, keys) {
  const group = createElement("div", "benchmark-group");
	const groupLabel = createElement("div", "benchmark-group-label", label);
	groupLabel.dataset.count = String(keys.length);
  group.append(groupLabel);

  const list = createElement("ul", "benchmark-list");
  for (const key of keys) {
    const item = document.createElement("li");
    item.append(createElement("samp", "", benchmarkLabels[key] ?? key));
    list.append(item);
  }
  group.append(list);
  container.append(group);
}

function renderBenchmarks(payload) {
	const scoring = payload.metadata?.scoring ?? {};
	const container = document.getElementById("benchmark-groups");
	container.replaceChildren();
	for (const [field, label] of Object.entries(labels)) {
		const keys = Array.isArray(scoring[field]) ? scoring[field] : [];
		renderBenchmarkGroup(container, label, keys);
	}
	renderWeights(container, scoring.overall_relative_score_weights ?? {});
}

function renderWeights(container, weights) {
	const group = createElement("div", "benchmark-group");
	const groupLabel = createElement("div", "benchmark-group-label", "Weights");
	groupLabel.dataset.count = "overall";
	group.append(groupLabel);

	const list = createElement("ul", "benchmark-list weight-list");
	for (const [name, value] of Object.entries(weights)) {
		const item = document.createElement("li");
		const chip = createElement("samp", "");
		chip.append(`${name} `);
		chip.append(createElement("b", "", formatWeight(value)));
		item.append(chip);
		list.append(item);
	}
	group.append(list);
	container.append(group);
}

function tableCell(text, className) {
	const cell = createElement("td", className, text);
	if (text === "-") {
		cell.classList.add("missing");
	}
  return cell;
}

function scoreCell(value, className = "") {
	const cell = createElement("td", `score-cell ${className}`.trim());
	const score = typeof value === "number" && Number.isFinite(value) ? value : null;
	if (score == null) {
		cell.classList.add("missing");
	}
	cell.style.setProperty("--score", String(Math.max(0, Math.min(100, score ?? 0))));
	cell.append(createElement("span", "score-value", formatScore(score)));
	cell.append(createElement("span", "score-meter"));
	return cell;
}

function modelCell(model) {
	const cell = document.createElement("td");
	const wrapper = createElement("div", "model-cell");
	wrapper.append(logoElement(model));
	const text = document.createElement("div");
	text.append(createElement("div", "model", model.name ?? "-"));
	text.append(createElement("div", "id", model.id ?? "-"));
	wrapper.append(text);
	cell.append(wrapper);
	return cell;
}

function logoElement(model) {
	const logo = createElement("img", "provider-logo");
	const logoSlug = safeSlug(model.provider);
	logo.alt = "";
	logo.loading = "lazy";
	logo.src = logoSlug
		? `./.cache/stats-logos/${logoSlug}.png`
		: model.logo;
	logo.onerror = () => {
		if (typeof model.logo === "string" && model.logo !== logo.src) {
			logo.src = model.logo;
			return;
		}
		logo.remove();
	};
	return logo;
}

function canonicalProviderId(provider) {
	return String(provider ?? "").toLowerCase().replace(/^~+/, "");
}

function canonicalDisplayModelId(model) {
	const id = typeof model.id === "string" ? model.id : "";
	const slashIndex = id.indexOf("/");
	if (slashIndex <= 0) {
		return id.toLowerCase().replace(/\./g, "-").replace(/-+/g, "-");
	}
	const provider = canonicalProviderId(id.slice(0, slashIndex));
	const slug = id
		.slice(slashIndex + 1)
		.toLowerCase()
		.replace(/\./g, "-")
		.replace(/-+/g, "-")
		.replace(/-\d{8}$/, "")
		.replace(/-fast$/, "");
	return `${provider}/${slug}`;
}

function displayAliasPriority(model) {
	const id = typeof model.id === "string" ? model.id.toLowerCase() : "";
	if (id.includes("latest")) {
		return 3;
	}
	if (id.replace(/\./g, "-").endsWith("-fast")) {
		return 2;
	}
	if (/-\d{8}$/.test(id)) {
		return 1;
	}
	return 0;
}

function dedupeDisplayModels(models) {
	const byDisplayId = new Map();
	for (const [originalIndex, model] of models.entries()) {
		const key = canonicalDisplayModelId(model);
		const candidate = {
			model,
			originalIndex,
			priority: displayAliasPriority(model),
		};
		const existing = byDisplayId.get(key);
		if (!existing || candidate.priority < existing.priority) {
			byDisplayId.set(key, candidate);
		}
	}
	return [...byDisplayId.values()].sort(
		(left, right) => left.originalIndex - right.originalIndex,
	);
}

function renderRows(payload) {
	const models = Array.isArray(payload.models) ? payload.models : [];
	tableRows = dedupeDisplayModels(models);
	renderSortedRows();
}

function renderSortedRows() {
	const models = sortedRows();
	const rows = document.getElementById("model-rows");
	rows.replaceChildren();
	document.getElementById("row-count").textContent = `${models.length} of ${tableRows.length} models`;

	for (const [displayIndex, rowData] of models.entries()) {
		const model = rowData.model;
		const relativeScores = model.relative_scores ?? {};
		const row = document.createElement("tr");
		row.append(tableCell(String(displayIndex + 1).padStart(2, "0"), "rank"));
		row.append(modelCell(model));
		row.append(scoreCell(relativeScores.overall_score, "overall"));
		row.append(scoreCell(relativeScores.intelligence_score));
		row.append(scoreCell(relativeScores.agentic_score));
		row.append(scoreCell(relativeScores.speed_score));
		row.append(scoreCell(relativeScores.value_score));
		row.append(tableCell(formatCost(model.cost?.blended_price), "data-cell"));
		row.append(
			tableCell(
				formatContext(
					model.context_window?.context ?? model.context_window?.total,
				),
				"data-cell",
			),
		);
		for (const column of taskMetricColumns) {
			const value = taskMetricValue(model, column);
			row.append(tableCell(formatTaskMetric(value, column), "data-cell"));
		}
		rows.append(row);
	}
	updateSortHeaders();
	syncFrameWidth();
}

function sortedRows() {
	const sorter = sorters[sortState.key] ?? sorters.rank;
	const direction = sortState.direction === "descending" ? -1 : 1;
	return filteredRows().sort((left, right) => {
		const leftValue = sorter.value(left);
		const rightValue = sorter.value(right);
		const missingCompared = compareMissingValues(sorter, leftValue, rightValue);
		if (missingCompared !== 0) {
			return missingCompared;
		}
		const compared = compareSortValues(sorter, leftValue, rightValue);
		if (compared !== 0) {
			return compared * direction;
		}
		return left.originalIndex - right.originalIndex;
	});
}

function filteredRows() {
	const query = filterQuery.trim().toLowerCase();
	if (!query) {
		return [...tableRows];
	}
	return tableRows.filter(({ model }) => {
		const searchable = [
			model.name,
			model.id,
			model.provider,
		].join(" ").toLowerCase();
		return searchable.includes(query);
	});
}

function compareMissingValues(sorter, left, right) {
	if (sorter.type !== "number") {
		return 0;
	}
	const leftMissing = typeof left !== "number" || !Number.isFinite(left);
	const rightMissing = typeof right !== "number" || !Number.isFinite(right);
	if (leftMissing && rightMissing) {
		return 0;
	}
	if (leftMissing) {
		return 1;
	}
	if (rightMissing) {
		return -1;
	}
	return 0;
}

function compareSortValues(sorter, left, right) {
	if (sorter.type === "text") {
		return String(left ?? "").localeCompare(String(right ?? ""), undefined, { sensitivity: "base" });
	}
	return left - right;
}

function updateSortHeaders() {
	for (const header of document.querySelectorAll("th")) {
		const key = header.querySelector("[data-sort]")?.dataset.sort;
		const mirrored = isRankIntelligencePair(sortState.key) && isRankIntelligencePair(key);
		header.setAttribute("aria-sort", key === sortState.key ? sortState.direction : "none");
		header.dataset.sortState = key === sortState.key || mirrored ? sortState.direction : "none";
	}
}

function isRankIntelligencePair(key) {
	return key === "rank" || key === "intelligence";
}

function bindSortHeaders() {
	for (const button of document.querySelectorAll("[data-sort]")) {
		if (!button.querySelector(".sort-indicator")) {
			button.append(createElement("span", "sort-indicator"));
		}
		button.addEventListener("mouseenter", () => showColumnTooltip(button));
		button.addEventListener("focus", () => showColumnTooltip(button));
		button.addEventListener("mouseleave", () => hideColumnTooltip(button));
		button.addEventListener("blur", () => hideColumnTooltip(button));
		button.addEventListener("click", () => {
			const key = button.dataset.sort;
			if (!key || !sorters[key]) {
				return;
			}
			const defaultDirection = sorters[key].direction;
			sortState = {
				key,
				direction: sortState.key === key && sortState.direction === defaultDirection
					? reverseDirection(defaultDirection)
					: defaultDirection,
			};
			renderSortedRows();
		});
	}
}

function bindModelFilter() {
	const input = document.getElementById("model-filter");
	input.addEventListener("input", () => {
		filterQuery = input.value;
		renderSortedRows();
	});
}

function bindRefreshButton() {
	document.getElementById("refresh-button").addEventListener("click", refreshFromButton);
}

async function refreshFromButton() {
	if (await syncUiVersion()) {
		return;
	}
	await refreshPayload();
}

function reverseDirection(direction) {
	return direction === "ascending" ? "descending" : "ascending";
}

function syncFrameWidth() {
	const table = document.querySelector("table");
	const mainElement = document.querySelector("main");
	if (!table || !mainElement) {
		return;
	}
	mainElement.style.setProperty("--frame-width", `${Math.ceil(table.scrollWidth)}px`);
}

function syncActiveColumnTooltip() {
	const tooltip = document.getElementById("column-tooltip");
	if (activeTooltipButton && tooltip?.classList.contains("visible")) {
		positionColumnTooltip(activeTooltipButton, tooltip);
	}
}

async function main() {
	await syncUiVersion();
	await refreshPayload();
}

async function refreshPayload() {
	if (refreshInFlight) {
		return refreshInFlight;
	}
	setRefreshing(true);
	refreshInFlight = loadAndRenderPayload().finally(() => {
		refreshInFlight = null;
		setRefreshing(false);
	});
	return refreshInFlight;
}

async function loadAndRenderPayload() {
	try {
		const payload = await loadPayload();
		columnTooltips = payload.metadata?.scoring?.column_tooltips ?? {};
		renderBenchmarks(payload);
		renderRows(payload);
	} catch (error) {
		console.error("Unable to refresh stats", error);
	}
}

async function syncUiVersion() {
	if (uiVersionCheckInFlight) {
		return uiVersionCheckInFlight;
	}
	uiVersionCheckInFlight = fetchText(uiPath)
		.then((html) => {
			const versionKey = `${html.length}:${checksum(html)}`;
			if (currentUiVersion == null) {
				currentUiVersion = versionKey;
				return false;
			}
			if (currentUiVersion !== versionKey) {
				location.reload();
				return true;
			}
			return false;
		})
		.catch(() => false)
		.finally(() => {
			uiVersionCheckInFlight = null;
		});
	return uiVersionCheckInFlight;
}

function checksum(value) {
	let hash = 0;
	for (let index = 0; index < value.length; index += 1) {
		hash = (hash * 31 + value.charCodeAt(index)) >>> 0;
	}
	return hash;
}

function setRefreshing(isRefreshing) {
	const button = document.getElementById("refresh-button");
	button.disabled = isRefreshing;
	button.setAttribute("aria-busy", String(isRefreshing));
}

async function loadPayload() {
	if (location.protocol === "file:") {
		throw new Error("Live stats require the dev server");
	}
	return fetchPayload(liveStatsPath);
}

async function fetchPayload(path) {
	return (await fetchFresh(path)).json();
}

async function fetchText(path) {
	return (await fetchFresh(path)).text();
}

async function fetchFresh(path) {
	const response = await fetch(cacheBustedPath(path), { cache: "reload" });
	if (!response.ok) {
		throw new Error(`HTTP ${response.status}`);
	}
	return response;
}

bindSortHeaders();
bindModelFilter();
bindRefreshButton();
main();
window.addEventListener("resize", () => {
	syncFrameWidth();
	syncActiveColumnTooltip();
});
document.querySelector(".table-wrap")?.addEventListener("scroll", syncActiveColumnTooltip);
</script>
